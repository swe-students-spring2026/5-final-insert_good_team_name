<script>
    function addTag(select, fieldName) {
        const value = select.value;
        const text = select.options[select.selectedIndex].text;
        if (!value) return;

        const hiddenContainer = document.getElementById(fieldName + "-hidden");
        const selectedContainer = document.getElementById("selected-" + fieldName);

        // Don't add duplicates
        if (document.querySelector(`input[name="${fieldName}"][value="${value}"]`)) {
            select.value = "";
            return;
        }

        // Create chip
        const chip = document.createElement("div");
        chip.className = "tag-chip";
        chip.innerHTML = `${text} <span onclick="removeTag(this, '${fieldName}', '${value}')">✕</span>`;
        selectedContainer.appendChild(chip);

        // Create hidden input
        const input = document.createElement("input");
        input.type = "hidden";
        input.name = fieldName;
        input.value = value;
        input.id = `${fieldName}-${value}`;
        hiddenContainer.appendChild(input);

        // Reset dropdown
        select.value = "";
    }

    function removeTag(span, fieldName, value) {
        span.parentElement.remove();
        const input = document.getElementById(`${fieldName}-${value}`);
        if (input) input.remove();
    }
</script>
