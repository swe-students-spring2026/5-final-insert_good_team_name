{% extends "base.html" %}
{% block title %}Create Event — DinnerMeet{% endblock %}

{% block content %}
<div class="form-container centered">
    <h1>Create Event</h1>

    {% if error %}
        <div class="flash error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/events/create">
        <label for="title" class="required">Title:</label>
        <input type="text" id="title" name="title" value="{{ data.get('title', '') if data else '' }}" required />

        <label for="datetime" class="required">Date & Time:</label>
        <input type="datetime-local" id="datetime" name="datetime" value="{{ data.get('datetime', '') if data else '' }}" required />
        <p id="datetime-display" style="font-size: 0.9rem; color: #555; margin-top: 0.4rem;"></p>

        <script>
            const input = document.getElementById("datetime");
            const display = document.getElementById("datetime-display");

            const now = new Date();
            now.setSeconds(0, 0);
            const offset = now.getTimezoneOffset() * 60000;
            const localNow = new Date(now - offset).toISOString().slice(0, 16);
            input.min = localNow;

            input.addEventListener("change", function () {
                if (input.value) {
                    const date = new Date(input.value);
                    display.textContent = date.toLocaleString("en-US", {
                        month: "long",
                        day: "numeric",
                        year: "numeric",
                        hour: "numeric",
                        minute: "2-digit",
                    });
                }
            });

            if (input.value) {
                const date = new Date(input.value);
                display.textContent = date.toLocaleString("en-US", {
                    month: "long", day: "numeric", year: "numeric",
                    hour: "numeric", minute: "2-digit",
                });
            }
        </script>

        <label for="capacity" class="required">Hosting Capacity:</label>
        <input type="number" id="capacity" name="capacity" min="2" placeholder="Max guests (min 2)" value="{{ data.get('capacity', '') if data else '' }}" required />

        <label for="location" class="required">Location:</label>
        <select id="location" name="location" required>
            <option value="">Select a neighborhood...</option>
            <option value="Battery Park City">Battery Park City</option>
            <option value="Chelsea">Chelsea</option>
            <option value="West Chelsea">West Chelsea</option>
            <option value="Chinatown">Chinatown</option>
            <option value="Civic Center">Civic Center</option>
            <option value="East Village">East Village</option>
            <option value="Financial District">Financial District</option>
            <option value="Fulton/Seaport">Fulton/Seaport</option>
            <option value="Flatiron">Flatiron</option>
            <option value="NoMad">NoMad</option>
            <option value="Gramercy Park">Gramercy Park</option>
            <option value="Greenwich Village">Greenwich Village</option>
            <option value="Noho">Noho</option>
            <option value="Little Italy">Little Italy</option>
            <option value="Lower East Side">Lower East Side</option>
            <option value="Two Bridges">Two Bridges</option>
            <option value="Nolita">Nolita</option>
            <option value="Soho">Soho</option>
            <option value="Hudson Square">Hudson Square</option>
            <option value="Stuyvesant Town/PCV">Stuyvesant Town/PCV</option>
            <option value="Tribeca">Tribeca</option>
            <option value="West Village">West Village</option>
            <option value="Central Park South">Central Park South</option>
            <option value="Midtown">Midtown</option>
            <option value="Midtown East">Midtown East</option>
            <option value="Kips Bay">Kips Bay</option>
            <option value="Murray Hill">Murray Hill</option>
            <option value="Sutton Place">Sutton Place</option>
            <option value="Turtle Bay">Turtle Bay</option>
            <option value="Beekman">Beekman</option>
            <option value="Midtown South">Midtown South</option>
            <option value="Midtown West">Midtown West</option>
            <option value="Hell's Kitchen">Hell's Kitchen</option>
            <option value="Hudson Yards">Hudson Yards</option>
            <option value="Upper East Side">Upper East Side</option>
            <option value="Carnegie Hill">Carnegie Hill</option>
            <option value="Lenox Hill">Lenox Hill</option>
            <option value="Upper Carnegie Hill">Upper Carnegie Hill</option>
            <option value="Yorkville">Yorkville</option>
            <option value="Central Harlem">Central Harlem</option>
            <option value="South Harlem">South Harlem</option>
            <option value="East Harlem">East Harlem</option>
            <option value="Hamilton Heights">Hamilton Heights</option>
            <option value="Inwood">Inwood</option>
            <option value="Marble Hill">Marble Hill</option>
            <option value="Morningside Heights">Morningside Heights</option>
            <option value="Washington Heights">Washington Heights</option>
            <option value="Fort George">Fort George</option>
            <option value="Hudson Heights">Hudson Heights</option>
            <option value="West Harlem">West Harlem</option>
            <option value="Manhattanville">Manhattanville</option>
            <option value="Upper West Side">Upper West Side</option>
            <option value="Lincoln Square">Lincoln Square</option>
            <option value="Manhattan Valley">Manhattan Valley</option>
        </select>

        <label for="description">Short Description:</label>
        <input type="text" id="description" name="description" value="{{ data.get('description', '') if data else '' }}" />

        <label for="dining">Is this a dining event?</label>
        <select id="dining" name="dining" onchange="toggleDiningTags(this)">
            <option value="">Select...</option>
            <option value="true" {{ 'selected' if data and data.get('dining') == 'true' }}>Yes</option>
            <option value="false" {{ 'selected' if data and data.get('dining') == 'false' }}>No</option>
        </select>

        <div id="dining-tags-section" style="display:none;">
            <label>Dining Type:</label>
            <div class="tag-select-container">
                <div class="selected-tags" id="selected-dining_tags"></div>
                <select id="dining_tags-dropdown" onchange="addTag(this, 'dining_tags')">
                    <option value="">Select a dining type...</option>
                    <option value="vegan">Vegan</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="gluten_free">Gluten-Free</option>
                    <option value="halal">Halal</option>
                    <option value="kosher">Kosher</option>
                    <option value="nut_free">Nut-Free</option>
                    <option value="dairy_free">Dairy-Free</option>
                    <option value="no_pork">No Pork</option>
                </select>
                <div id="dining_tags-hidden"></div>
            </div>
        </div>

        <label>Event Type:</label>
        <div class="tag-select-container">
            <div class="selected-tags" id="selected-tags"></div>
            <select id="tags-dropdown" onchange="addTag(this, 'tags')">
                <option value="">Select an event type...</option>
                <option value="restaurant_meetup">Restaurant Meetup</option>
                <option value="coffee_meetup">Coffee Meetup</option>
                <option value="bar_crawl">Bar Crawl</option>
                <option value="house_party">House Party</option>
                <option value="board_game_night">Board Game Night</option>
                <option value="trivia_night">Trivia Night</option>
                <option value="art_session">Art Session</option>
                <option value="music_jam">Music Jam</option>
                <option value="study_group">Study Group</option>
                <option value="workshop">Workshop</option>
                <option value="networking_event">Networking Event</option>
                <option value="movie_night">Movie Night</option>
                <option value="concert">Concert</option>
                <option value="hiking_event">Hiking Event</option>
                <option value="beach_day">Beach Day</option>
            </select>
            <div id="tags-hidden"></div>
        </div>

        <button type="submit">Create Event</button>
    </form>
</div>

<script>
    function toggleDiningTags(select) {
        const section = document.getElementById("dining-tags-section");
        section.style.display = select.value === "true" ? "block" : "none";
    }

    function addTag(select, fieldName) {
        const value = select.value;
        const text = select.options[select.selectedIndex].text;
        if (!value) return;

        const hiddenContainer = document.getElementById(fieldName + "-hidden");
        const selectedContainer = document.getElementById("selected-" + fieldName);

        if (document.querySelector(`input[name="${fieldName}"][value="${value}"]`)) {
            select.value = "";
            return;
        }

        const chip = document.createElement("div");
        chip.className = "tag-chip";
        chip.innerHTML = `${text} <span onclick="removeTag(this, '${fieldName}', '${value}')">✕</span>`;
        selectedContainer.appendChild(chip);

        const input = document.createElement("input");
        input.type = "hidden";
        input.name = fieldName;
        input.value = value;
        input.id = `${fieldName}-${value}`;
        hiddenContainer.appendChild(input);

        select.value = "";
    }

    function removeTag(span, fieldName, value) {
        span.parentElement.remove();
        const input = document.getElementById(`${fieldName}-${value}`);
        if (input) input.remove();
    }
</script>
{% endblock %}
