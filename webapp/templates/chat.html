{% extends "base.html" %}
{% block content %}

<h2>Chat with {{ otherUsername }}</h2>

<div id="messages">
    {% for msg in messages %}
        <div>
            <b>{{ msg.sender }}:</b> {{ msg.message }}
        </div>
    {% endfor %}
</div>

<form method="POST">
    <input type="text" name="message" placeholder="Type message..." required>
    <button type="submit">Send</button>
</form>

{% endblock %}
