name: CI

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r webapp/requirements.txt
          pip install -r matching-service/requirements.txt
          pip install black pylint

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Run black
        run: black --check webapp matching-service

      - name: Run pylint
        run: pylint webapp matching-service

      - name: Run Python syntax checks
        run: |
          python -m py_compile webapp/app.py
          python -m py_compile matching-service/app.py
